<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ProMomentum | Log In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-error": "#ffffff",
                      "primary-fixed-dim": "#b2c5ff",
                      "on-background": "#191b23",
                      "inverse-surface": "#2e3038",
                      "on-primary-container": "#ccd8ff",
                      "tertiary": "#24467c",
                      "secondary-fixed": "#6bfe9c",
                      "on-surface": "#191b23",
                      "surface-container-highest": "#e1e2ec",
                      "tertiary-fixed": "#d7e2ff",
                      "primary": "#01457d",
                      "inverse-primary": "#b2c5ff",
                      "surface-dim": "#d9d9e4",
                      "surface": "#faf8ff",
                      "tertiary-container": "#3e5e95",
                      "on-primary-fixed": "#001847",
                      "on-secondary-fixed-variant": "#005228",
                      "on-secondary-fixed": "#00210c",
                      "error-container": "#ffdad6",
                      "surface-container-lowest": "#ffffff",
                      "primary-fixed": "#dae2ff",
                      "secondary-container": "#6bfe9c",
                      "on-surface-variant": "#424654",
                      "on-secondary-container": "#00743a",
                      "surface-container": "#ededf8",
                      "tertiary-fixed-dim": "#abc7ff",
                      "outline": "#737785",
                      "on-tertiary-fixed-variant": "#24467c",
                      "surface-bright": "#faf8ff",
                      "surface-container-high": "#e7e7f2",

                      "surface-container-low": "#f2f3fe",
                      "secondary-fixed-dim": "#4ae183",
                      "outline-variant": "#c3c6d6",

                      "surface-tint": "#01457d",

              "fontFamily": {
                      "headline": ["Lexend"],
                      "body": ["Manrope"],
                      "label": ["Manrope"]

          },
        }
      </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(225, 226, 236, 0.6);
            backdrop-filter: blur(12px);
        }
        .velocity-gradient {
            background: linear-gradient(135deg, #01457d 0%, #0056d2 100%);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background font-body text-on-background min-h-screen flex flex-col overflow-x-hidden">
<!-- Top Navigation (Simplified for Login) -->
<nav class="w-full top-0 sticky flex justify-between items-center px-6 py-4 max-w-full bg-surface dark:bg-slate-950 tonal-shift bg-surface-container dark:bg-slate-900 z-50">
<div class="font-lexend tracking-tight text-2xl font-bold italic text-[#01457d] dark:text-blue-400">
        ProMomentum
    </div>
<div class="text-[#01457d] dark:text-blue-400 font-lexend tracking-tight font-medium hover:text-[#003460] dark:hover:text-blue-300 transition-colors">
        Support
    </div>
</nav>
<main class="flex-grow flex flex-col items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Background Aesthetic Elements (Editorial Organic Structuralism) -->
<div class="absolute top-0 right-0 -translate-y-1/2 translate-x-1/4 w-96 h-96 velocity-gradient opacity-10 blur-3xl rounded-full"></div>
<div class="absolute bottom-0 left-0 translate-y-1/2 -translate-x-1/4 w-80 h-80 bg-secondary-fixed opacity-5 blur-3xl rounded-full"></div>
<div class="w-full max-w-md z-10 space-y-10">
<!-- Header Section -->
<div class="space-y-4">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-primary leading-tight">
                Log In
            </h1>
<p class="text-on-surface-variant text-lg font-medium max-w-[280px]">
                Access your athletic performance dashboard.
            </p>
</div>
<!-- Authentication Form -->
<form class="space-y-6">
<!-- Inputs Stacking -->
<div class="space-y-5">
<div class="relative group">
<label class="block font-label text-sm font-semibold mb-2 ml-1 text-on-surface-variant group-focus-within:text-primary transition-colors">
                        Email Address
                    </label>
<input class="w-full h-14 px-5 bg-surface-container-highest border-none rounded-DEFAULT ring-1 ring-outline-variant ring-opacity-20 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline outline-none" placeholder="name@organization.com" type="email"/>
</div>
<div class="relative group">
<label class="block font-label text-sm font-semibold mb-2 ml-1 text-on-surface-variant group-focus-within:text-primary transition-colors">
                        Password
                    </label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-highest border-none rounded-DEFAULT ring-1 ring-outline-variant ring-opacity-20 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all placeholder:text-outline outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
</div>
<div class="flex items-center justify-between px-1">
<label class="flex items-center space-x-2 text-sm text-on-surface-variant font-medium">
<input class="w-4 h-4 rounded-sm border-outline-variant text-primary focus:ring-primary" type="checkbox"/>
<span>Remember me</span>
</label>
<a class="text-sm font-semibold text-primary hover:underline" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-16 velocity-gradient text-on-primary font-headline font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:scale-[0.98] active:scale-95 transition-transform duration-150 flex items-center justify-center gap-3">
                Sign In
                <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
<span class="text-sm font-label font-bold text-outline uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] flex-grow bg-surface-container-highest"></div>
</div>
<!-- Social Authentication -->
<button class="w-full h-14 bg-surface-container-lowest flex items-center justify-center gap-3 rounded-full ring-1 ring-outline-variant ring-opacity-30 hover:bg-surface-container-low transition-colors shadow-sm">
<svg fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.11c-.22-.66-.35-1.36-.35-2.11s.13-1.45.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"></path>
</svg>
<span class="font-headline font-bold text-on-surface">Sign in with Google</span>
</button>
<!-- Bottom Redirect -->
<p class="text-center text-on-surface-variant font-medium">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline ml-1" href="#">Create Account</a>
</p>
</div>
</main>
<!-- Simple Footer for transactional screen -->
<footer class="w-full py-8 mt-auto flex flex-col items-center gap-4 px-8 bg-surface-container-low dark:bg-slate-900 tonal-shift-no-lines">
<div class="flex gap-6">
<a class="font-manrope text-sm text-slate-500 dark:text-slate-400 hover:text-[#01457d] transition-colors" href="#">Privacy Policy</a>
<a class="font-manrope text-sm text-slate-500 dark:text-slate-400 hover:text-[#01457d] transition-colors" href="#">Terms of Service</a>
</div>
<div class="font-manrope text-sm text-slate-500 dark:text-slate-400">
        © 2024 ProMomentum Sports. Precision Momentum.
    </div>
</footer>
</body></html>
