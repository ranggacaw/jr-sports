services:
  app:
    build:
      context: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "${APP_URL:-http://localhost}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-jr_sports}"
      DB_USERNAME: "${DB_USERNAME:-jr_sports}"
      DB_PASSWORD: "${DB_PASSWORD:-secret}"
      RUN_MIGRATIONS: "true"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-jr_sports}"
      MYSQL_USER: "${DB_USERNAME:-jr_sports}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      retries: 10
      timeout: 5s
      interval: 10s

volumes:
  mysql:
