<!-- Sport Selection -->
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Sport Name</label>
<div class="relative group">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface transition-all placeholder:text-outline/50 font-medium" placeholder="e.g. Competitive Padel" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/50 group-focus-within:text-primary">sports_tennis</span>
</div>
</div>
<!-- Frequency & Date -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Frequency</label>
<select class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface appearance-none font-medium">
<option>One-off</option>
<option>Weekly</option>
<option>Monthly</option>
</select>
</div>
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Date</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface font-medium" type="date"/>
</div>
</div>
<!-- Time Selection -->
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Start Time</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface font-medium" type="time"/>
</div>
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">End Time</label>
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface font-medium" type="time"/>
</div>
</div>
<!-- Venue Info -->
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Venue Name</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface font-medium" placeholder="Arena Central Hub" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/50">location_on</span>
</div>
</div>
<!-- Maps Link -->
<div class="space-y-2">
<label class="block text-blue-700 font-bold font-headline text-sm ml-1">Google Maps URL</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-none rounded-lg px-4 py-4 focus:ring-2 focus:ring-primary text-on-surface font-medium" placeholder="https://maps.google.com/..." type="url"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline/50">map</span>
</div>
</div>
