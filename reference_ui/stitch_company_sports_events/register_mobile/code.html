<div class="absolute inset-0 opacity-40 mix-blend-overlay">
<img alt="Professional athletes in a stadium tunnel" class="w-full h-full object-cover" data-alt="dramatic wide shot of a professional sports stadium tunnel with sharp geometric shadows and bright sunlight at the exit" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAVeHAaOT1tJF0yxDrKe79i2RX94O3TfgG-pUPSFEPfac8fVD5JYTYqxySqQy2V-NA4Wb9uSC9S_pC6ZApHPcD00xpf7wgyqJ-RaqR6eT6Hen-1j4reWxi6xY0d-zapPLi9ESdD5fU6EfCIrxxmVZZBBVF2L7d-dq80KY6ISWsCmRV7SdoBt9HCHXUKZJWcJCoa2tuco7Y1R83p3ObCpAYLjUrPSFzq0YcvMe5G3UiaQyljHit2rZIhLpP57xfKZJENlUNd3u0t86yO"/>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-primary via-primary/40 to-transparent"></div>
<div class="relative z-10">
<h2 class="font-headline text-on-primary text-2xl font-bold italic tracking-tight">ProMomentum</h2>
<h1 class="font-headline text-on-primary text-5xl font-extrabold mt-2 leading-[0.9] tracking-tighter">Sign Up</h1>
<p class="text-on-primary-container font-medium mt-3 opacity-90 max-w-[240px]">Join the elite ecosystem of professional sports management.</p>
</div>
</div>
<!-- Registration Content Canvas -->
<main class="w-full max-w-md px-8 -mt-6 relative z-20 bg-background rounded-t-[2.5rem] pt-10 pb-12">
<!-- Social Registration -->
<button class="w-full flex items-center justify-center gap-3 py-4 px-6 bg-surface-container-lowest rounded-full shadow-[0px_12px_32px_rgba(25,27,35,0.06)] border border-outline-variant/15 hover:bg-surface-container transition-all duration-200">
<svg class="w-6 h-6" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-label font-bold text-on-surface">Continue with Google</span>
</button>
<div class="flex items-center gap-4 my-8">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="text-on-surface-variant font-label text-xs uppercase tracking-widest font-bold">Or register with email</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Form Fields -->
<form class="space-y-6">
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-primary ml-1" for="full-name">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-transparent rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all outline-none" id="full-name" placeholder="Enter your full name" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-primary ml-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-transparent rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block font-label text-sm font-bold text-primary ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-highest border-transparent rounded-lg py-4 px-5 text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all outline-none" id="password" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded border-outline-variant text-primary focus:ring-primary/20" id="terms" type="checkbox"/>
</div>
<label class="text-sm font-body text-on-surface-variant leading-tight" for="terms">
                    I agree to the <a class="text-primary font-bold" href="#">Terms of Service</a> and <a class="text-primary font-bold" href="#">Privacy Policy</a>.
                </label>
</div>
<button class="w-full py-5 bg-primary text-on-primary rounded-full font-headline font-bold text-lg shadow-lg shadow-primary/20 flex items-center justify-center gap-2 group" type="submit">
                Create Account
                <span class="material-symbols-outlined transition-transform group-hover:translate-x-1">arrow_forward</span>
</button>
</form>
<div class="mt-10 text-center">
<p class="font-body text-on-surface-variant">
                Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log In</a>
</p>
</div>
</main>
<!-- Aesthetic Floating Element (Editorial Touch) -->
<div class="fixed bottom-0 left-0 w-full p-4 pointer-events-none opacity-10">
<div class="text-[10rem] font-headline font-black italic tracking-tighter leading-none text-primary whitespace-nowrap select-none">
            MOMENTUM
        </div>
</div>
<!-- Mandatory Footer from JSON -->
<footer class="w-full py-8 mt-auto flex flex-col items-center gap-4 px-8 bg-surface-container-low dark:bg-slate-900 font-manrope text-sm">
<div class="flex flex-wrap justify-center gap-6">
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-500 transition-colors" href="#">Privacy Policy</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-500 transition-colors" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-blue-500 transition-colors" href="#">Help Center</a>
</div>
<div class="font-lexend font-bold text-blue-700">ProMomentum</div>
<p class="text-slate-500 dark:text-slate-400">© 2024 ProMomentum Sports. Precision Momentum.</p>
</footer>
